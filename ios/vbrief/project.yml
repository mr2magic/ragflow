name: RAGFlowMobile
options:
  bundleIdPrefix: com.dhorn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

targets:
  RAGFlowMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - RAGFlowMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dhorn.ragflowmobile
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        INFOPLIST_FILE: RAGFlowMobile/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: EPUBKit
      - package: GRDB
      - package: Zip
      - sdk: PDFKit.framework
      - sdk: Accelerate.framework
      - sdk: CloudKit.framework
      - sdk: CoreML.framework

  RAGFlowMobileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - RAGFlowMobileTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: RAGFlowMobile

packages:
  EPUBKit:
    url: https://github.com/witekbobrowski/EPUBKit
    from: "0.4.1"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.27.0"
  Zip:
    url: https://github.com/marmelroy/Zip
    from: "2.1.0"
